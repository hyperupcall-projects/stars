name: 'Deploy Website'

on:
  workflow_dispatch:
  schedule:
  - cron: '30 0 2 * *' # Every second day of the month.

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch-stars:
    environment: 'otternaut'
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.14'
    - run: pipx install uv
    - run: ./bake run
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - run: ./bake process-files
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: generated-markdown
        path: ./website/content/pages/by-*.md

  build-website:
    runs-on: 'ubuntu-latest'
    needs: fetch-stars
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-markdown
          pattern: ./website/content/pages/by-*.md

      - name: 'Setup Pages'
        id: pages
        uses: 'actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d' # v6.0.0

      - name: "Install Hugo"
        run: |
          set -e
          version='0.163.3'
          curl -sSLf -o '${{ runner.temp }}/hugo.deb' "https://github.com/gohugoio/hugo/releases/download/v${version}/hugo_extended_${version}_linux-amd64.deb"
          sudo dpkg -i '${{ runner.temp }}/hugo.deb'

          # https://gohugo.io/host-and-deploy/host-on-github-pages.
          git config --global core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: hugo build
        run: |
            cd ./website
            hugo build \
              --gc \
              --minify \
              --baseURL "${{ steps.pages.outputs.base_url }}/" \
              --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: 'Upload artifact'
        uses: 'actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9' # v5.0.0
        with:
          path: './website/public'

  deploy-website:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: 'ubuntu-latest'
    needs: build-website
    steps:
      - name: 'Deploy to GitHub Pages'
        id: deployment
        uses: 'actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128' # v5.0.0
